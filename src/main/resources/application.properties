# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# PostgreSQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT Configuration
# ============================================================
# Secret key: must be at least 256-bit (32 chars). Use a strong random value in production!
application.security.jwt.secret-key=5468576D5A7134743777217A25432A462D4A614E645267556B58703273357638
# Access token expiry: 15 minutes (in milliseconds)
application.security.jwt.expiration=900000
# Refresh token expiry: 7 days (in milliseconds)
application.security.jwt.refresh-token.expiration=604800000

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.authmodule=DEBUG


